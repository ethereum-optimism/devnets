services:
    - kind: "supernode"
      name: "op-supernode-0"
      spec:
          kind: "op-supernode"
      deps:
          nodes:
              - "sn-0"

    - kind: "supernode"
      name: "op-supernode-1"
      spec:
          kind: "op-supernode"
      deps:
          nodes:
              - "sn-1"

    - kind: "supernode"
      name: "op-supernode-2"
      spec:
          kind: "op-supernode"
      deps:
          nodes:
              - "sn-2"

    - kind: "supernode"
      name: "op-supernode-3"
      spec:
          kind: "op-supernode"
          values:
            env:
              OP_SUPERNODE_VN_420120070_SYNCMODE: "consensus-layer"
              OP_SUPERNODE_VN_420120071_SYNCMODE: "consensus-layer"
              OP_SUPERNODE_VN_ALL_SYNCMODE: "consensus-layer"
      deps:
          nodes:
              - "sn-3"


    - kind: "supernode"
      name: "op-supernode-4"
      spec:
          kind: "op-supernode"
          values:
            image: 
              tag: "v0.2.1"
            env:
              OP_SUPERNODE_VN_420120070_SYNCMODE: "consensus-layer"
              OP_SUPERNODE_VN_420120071_SYNCMODE: "consensus-layer"
              OP_SUPERNODE_VN_ALL_SYNCMODE: "consensus-layer"
      deps:
          nodes:
              - "sn-4"


    - kind: "interop-filter"
      name: "op-interop-filter"
      spec:
          kind: "op-interop-filter"
      deps:
          nodes:
              - "rpc-0"
