chains:
    - nodes:
          - kind: "node"
            name: "sequencer-0"
            spec:
                kind: "sequencer"
                lightNode: true
                el:
                    kind: "op-geth"
                    spec:
                        kind: "full"
                cl:
                    kind: "op-node"
                    deps:
                        services:
                            - "proxyd-cl"

          - kind: "node"
            name: "sequencer-1"
            spec:
                kind: "sequencer"
                lightNode: true
                el:
                    kind: "op-reth"
                    spec:
                        kind: "full"
                cl:
                    kind: "op-node"
                    deps:
                        services:
                            - "proxyd-cl"

          - kind: "node"
            name: "sequencer-2"
