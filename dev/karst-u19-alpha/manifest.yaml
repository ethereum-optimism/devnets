name: karst-u19-alpha
type: alphanet
status: online
description: |
    * Karst U19 Alphanet
      * Karst activated at genesis (Osaka EIPs, L2CM, CANNON_KONA)
      * karst-u19-alpha-0: permissioned fault proofs
      * karst-u19-alpha-1: permissionless fault proofs (fp-permissionless)
      * Fresh replacement for the u19 alphanets
metadata:
    domain: op-enterprise
    team: core
    tenant_id: karst-u19-alpha
    tenant_name: karst-u19-alpha
    tier_id: "100"
    features:
        mission_critical: false
features:
    - p2p-cluster-local
    - gateway-api
cluster:
    name: oplabs-dev-ent-networks-us-ue1-0
l1:
    name: sepolia
    chain_id: 11155111
l2:
    deployment:
        op-deployer:
            version: 0.7.0-rc.1
        l1-contracts:
            locator: ""
        l2-contracts:
            locator: ""
        overrides:
            l2GenesisKarstTimeOffset: "0x0"
        fund_dev_accounts: true
        gas_limit: 60000000
        eip1559_elasticity: 6
        eip1559_denominator: 50
        eip1559_denominator_canyon: 250
        superchain_roles:
            superchain_proxy_admin_owner: 0x8E851F7d8bAeaD95F592847a020cAC7A062dafd9
            protocol_versions_owner: 0x8E851F7d8bAeaD95F592847a020cAC7A062dafd9
            superchain_guardian: 0x8E851F7d8bAeaD95F592847a020cAC7A062dafd9
    components:
        balance-mon:
            version: balance-mon/v1.2.1
        flashblocks-websocket-proxy:
            version: flashblocks-websocket-proxy/v0.7.4
        kona-node:
            version: kona-node/v1.6.1-rc.2
        op-batcher:
            version: op-batcher/v1.16.10-rc.1
        op-challenger:
            version: op-challenger/v1.9.3
        op-conductor:
            version: op-conductor/v0.9.4
        op-conductor-mon:
            version: op-conductor-mon/v0.0.5
        op-conductor-ops:
            version: op-conductor-ops/v0.1.0
        op-dispute-mon:
            version: op-dispute-mon/v1.5.2
        op-geth:
            version: op-geth/v1.101702.3-rc.2
        op-interop-filter:
            version: op-interop-filter/v0.2.0-rc.1
        op-node:
            version: op-node/v1.19.1-rc.1
        op-program:
            version: op-program/v1.9.0-rc.1
        op-proposer:
            version: op-proposer/v1.16.3
        op-rbuilder:
            repository: us-docker.pkg.dev/oplabs-tools-artifacts/dev-images
            version: flashblocks-v5.2
        op-reth:
            version: op-reth/v2.3.2-rc.2
        op-supernode:
            version: op-supernode/v0.3.1-rc.1
        peer-mgmt-service:
            version: peer-mgmt-service/v0.0.4
        proxyd:
            version: proxyd/v4.27.4
        rollup-boost:
            repository: us-docker.pkg.dev/oplabs-tools-artifacts/dev-images
            version: flashblocks-v5.2
    chains:
        - name: karst-u19-alpha-0
          chain_id: "420100010"
          deployment:
            overrides: {}
            gas_limit: 60000000
            eip1559_elasticity: 6
            eip1559_denominator: 50
            eip1559_denominator_canyon: 250
            roles:
                l1_proxy_admin_owner: 0x8E851F7d8bAeaD95F592847a020cAC7A062dafd9
                l2_proxy_admin_owner: 0x9F961F7d8BAEAd95f592847a020cAC7A062Dc0EA
        - name: karst-u19-alpha-1
          chain_id: "420100011"
          features:
            - fp-permissionless
            - kona
            - fp-kona
          deployment:
            overrides: {}
            gas_limit: 60000000
            eip1559_elasticity: 6
            eip1559_denominator: 50
            eip1559_denominator_canyon: 250
            roles:
                l1_proxy_admin_owner: 0x8E851F7d8bAeaD95F592847a020cAC7A062dafd9
                l2_proxy_admin_owner: 0x9F961F7d8BAEAd95f592847a020cAC7A062Dc0EA
