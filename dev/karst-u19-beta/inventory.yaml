chains:
  # Chain 0 - Permissioned
  - values:
      op-node:
        safeHeadDb:
          persistentVolume:
            size: 1Gi
        env:
          OP_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "true"
      kona-node:
        env:
          KONA_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "true"
      op-reth:
        persistentVolume:
          size: 64Gi
        env:
          RETH_GENESIS_REDOWNLOAD: "true"
      op-geth:
        env:
          GETH_GENESIS_REDOWNLOAD: "true"
      op-rbuilder:
        persistentVolume:
          size: 64Gi
    nodes:
      - kind: "node"
        name: "seq-0"
        spec:
          kind: "sequencer"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"
          builder:
            kind: "op-rbuilder"
          flashblocks:
            builder:
              kind: "op-rbuilder"
            rollup-boost:
              kind: "rollup-boost"
            values:
              op-rbuilder:
                FLASHBLOCK_SEND_OFFSET_MS: "-250"

      - kind: "node"
        name: "seq-1"
        spec:
          kind: "sequencer"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"
          builder:
            kind: "op-rbuilder"
          flashblocks:
            builder:
              kind: "op-rbuilder"
            rollup-boost:
              kind: "rollup-boost"
            values:
              op-rbuilder:
                FLASHBLOCK_SEND_OFFSET_MS: "-250"

      - kind: "node"
        name: "seq-2"
        spec:
          kind: "sequencer"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"
          builder:
            kind: "op-rbuilder"
          flashblocks:
            builder:
              kind: "op-rbuilder"
            rollup-boost:
              kind: "rollup-boost"
            values:
              op-rbuilder:
                FLASHBLOCK_SEND_OFFSET_MS: "-250"

      - kind: "node"
        name: "rpc-0"
        spec:
          kind: "rpc"
          el:
            kind: "op-geth"
            spec:
              kind: "archive"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "rpc-1"
        spec:
          kind: "rpc"
          el:
            kind: "op-reth"
            spec:
              kind: "archive"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "rpc-2"
        spec:
          kind: "rpc"
          el:
            kind: "op-reth"
            spec:
              kind: "archive"
          values:
            kona-node:
              env:
                KONA_NODE_P2P_NO_DISCOVERY: "true"
            op-reth:
              env:
                RETH_DISABLE_DISCOVERY: "true"
          cl:
            kind: "kona-node"

      - kind: "node"
        name: "sync-0"
        spec:
          kind: "snapsync"
          el:
            kind: "op-geth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "sync-1"
        spec:
          kind: "snapsync"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          values:
            op-node:
              env:
                OP_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "false"
                OP_NODE_SYNCMODE: consensus-layer
                OP_NODE_P2P_DISABLE: "true"
            op-reth:
              env:
                RETH_DISABLE_DISCOVERY: "true"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "sync-2"
        spec:
          kind: "snapsync"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          values:
            kona-node:
              env:
                KONA_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "false"
                KONA_NODE_P2P_NO_DISCOVERY: "true"
            op-reth:
              env:
                RETH_DISABLE_DISCOVERY: "true"
          cl:
            kind: "kona-node"

    services:
      - kind: "proposer"
        name: "op-proposer"
        spec:
          kind: "op-proposer"
        deps:
          nodes:
            - "rpc-0"

      - kind: "batcher"
        name: "op-batcher"
        spec:
          kind: "op-batcher"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"
      - kind: "balance-mon"
        name: "balance-mon"
        spec:
          kind: "balance-mon"

      - kind: "challenger"
        name: "op-challenger"
        spec:
          kind: "op-challenger"
        deps:
          nodes:
            - "rpc-1"

      - kind: "public-rpc"
        name: "proxyd-public"
        spec:
          kind: "proxyd"
        deps:
          nodes:
            - "rpc-0"
            - "rpc-1"
            - "rpc-2"

      - kind: "peer-mgmt-service"
        name: "peer-mgmt-service"
        spec:
          kind: "peer-mgmt-service"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"
            - "rpc-0"
            - "rpc-1"
            - "rpc-2"
            - "sync-0"
            - "sync-1"
            - "sync-2"

      - kind: "op-conductor-mon"
        name: "op-conductor-mon"
        spec:
          kind: "op-conductor-mon"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"

      - kind: "op-conductor-ops"
        name: "op-conductor-ops"
        spec:
          kind: "op-conductor-ops"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"

      - kind: "op-dispute-mon"
        name: "op-dispute-mon"
        spec:
          kind: "op-dispute-mon"
        deps:
          nodes:
            - "rpc-0"

      - kind: "faucet"
        name: "op-faucet"
        spec:
          kind: "op-faucet"
        deps:
          nodes:
            - "rpc-0"
      - kind: "flashblocks-websocket-proxy"
        name: "fb-ws-proxy"
        spec:
          kind: "flashblocks-websocket-proxy"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"

  # Chain 1 - Permissionless
  - values:
      op-node:
        safeHeadDb:
          persistentVolume:
            size: 1Gi
        env:
          OP_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "true"
      kona-node:
        env:
          KONA_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "true"
      op-reth:
        persistentVolume:
          size: 64Gi
        env:
          RETH_GENESIS_REDOWNLOAD: "true"
      op-geth:
        env:
          GETH_GENESIS_REDOWNLOAD: "true"
      op-rbuilder:
        persistentVolume:
          size: 64Gi
    nodes:
      - kind: "node"
        name: "seq-0"
        spec:
          kind: "sequencer"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"
          builder:
            kind: "op-rbuilder"
          flashblocks:
            builder:
              kind: "op-rbuilder"
            rollup-boost:
              kind: "rollup-boost"
            values:
              op-rbuilder:
                FLASHBLOCK_SEND_OFFSET_MS: "-250"

      - kind: "node"
        name: "seq-1"
        spec:
          kind: "sequencer"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"
          builder:
            kind: "op-rbuilder"
          flashblocks:
            builder:
              kind: "op-rbuilder"
            rollup-boost:
              kind: "rollup-boost"
            values:
              op-rbuilder:
                FLASHBLOCK_SEND_OFFSET_MS: "-250"

      - kind: "node"
        name: "seq-2"
        spec:
          kind: "sequencer"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"
          builder:
            kind: "op-rbuilder"
          flashblocks:
            builder:
              kind: "op-rbuilder"
            rollup-boost:
              kind: "rollup-boost"
            values:
              op-rbuilder:
                FLASHBLOCK_SEND_OFFSET_MS: "-250"

      - kind: "node"
        name: "rpc-0"
        spec:
          kind: "rpc"
          el:
            kind: "op-geth"
            spec:
              kind: "archive"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "rpc-1"
        spec:
          kind: "rpc"
          el:
            kind: "op-reth"
            spec:
              kind: "archive"
          values:
            op-reth:
              env:
                RETH_HISTORICAL_PROOFS_ENABLED: "true"
                RETH_HISTORICAL_PROOFS_V2: "true"
                RETH_HISTORICAL_PROOFS_PRUNE_DEPTH: "2419200"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "rpc-2"
        spec:
          kind: "rpc"
          el:
            kind: "op-reth"
            spec:
              kind: "archive"
          values:
            kona-node:
              env:
                KONA_NODE_P2P_NO_DISCOVERY: "true"
            op-reth:
              env:
                RETH_DISABLE_DISCOVERY: "true"
          cl:
            kind: "kona-node"

      - kind: "node"
        name: "sync-0"
        spec:
          kind: "snapsync"
          el:
            kind: "op-geth"
            spec:
              kind: "full"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "sync-1"
        spec:
          kind: "snapsync"
          el:
            kind: "op-reth"
            spec:
              kind: "full"
          values:
            op-node:
              env:
                OP_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "false"
                OP_NODE_SYNCMODE: consensus-layer
                OP_NODE_P2P_DISABLE: "true"
            op-reth:
              env:
                RETH_DISABLE_DISCOVERY: "true"
          cl:
            kind: "op-node"

      - kind: "node"
        name: "sync-2"
        spec:
          kind: "snapsync"
          el:
            kind: "op-geth"
            spec:
              kind: "full"
          values:
            kona-node:
              env:
                KONA_NODE_OVERRIDE_KEEP_KARST_UPGRADE_GAS: "false"
          cl:
            kind: "kona-node"

    services:
      - kind: "proposer"
        name: "op-proposer"
        spec:
          kind: "op-proposer"
        deps:
          nodes:
            - "rpc-0"

      - kind: "batcher"
        name: "op-batcher"
        spec:
          kind: "op-batcher"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"
      - kind: "balance-mon"
        name: "balance-mon"
        spec:
          kind: "balance-mon"

      - kind: "challenger"
        name: "op-challenger"
        spec:
          kind: "op-challenger"
        deps:
          nodes:
            - "rpc-1"

      - kind: "public-rpc"
        name: "proxyd-public"
        spec:
          kind: "proxyd"
        deps:
          nodes:
            - "rpc-0"
            - "rpc-1"
            - "rpc-2"

      - kind: "peer-mgmt-service"
        name: "peer-mgmt-service"
        spec:
          kind: "peer-mgmt-service"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"
            - "rpc-0"
            - "rpc-1"
            - "rpc-2"
            - "sync-0"
            - "sync-1"
            - "sync-2"

      - kind: "op-conductor-mon"
        name: "op-conductor-mon"
        spec:
          kind: "op-conductor-mon"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"

      - kind: "op-conductor-ops"
        name: "op-conductor-ops"
        spec:
          kind: "op-conductor-ops"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"

      - kind: "op-dispute-mon"
        name: "op-dispute-mon"
        spec:
          kind: "op-dispute-mon"
        deps:
          nodes:
            - "rpc-0"

      - kind: "op-challenger-runner"
        name: "op-challenger-runner"
        spec:
          kind: "op-challenger-runner"
          values:
            env:
              OP_CHALLENGER_RUN: "cannon-kona"
              OP_CHALLENGER_TRACE_TYPE: "cannon-kona"
        deps:
          nodes:
            - "rpc-1"

      - kind: "faucet"
        name: "op-faucet"
        spec:
          kind: "op-faucet"
        deps:
          nodes:
            - "rpc-0"

      - kind: "flashblocks-websocket-proxy"
        name: "fb-ws-proxy"
        spec:
          kind: "flashblocks-websocket-proxy"
        deps:
          nodes:
            - "seq-0"
            - "seq-1"
            - "seq-2"
