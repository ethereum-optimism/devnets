name: u19-alpha-perm
type: alphanet
scope: https://github.com/ethereum-optimism/devnets/issues/343
status: online
description: |
    * U19 Alphanet (Permissioned baseline)
      * Karst activated at genesis (Osaka EIPs, L2CM, CANNON_KONA)
      * Permissioned fault proofs only (no fp-permissionless)
      * Counterpart to u19-alpha for permissioned/permissionless comparison
metadata:
    domain: op-enterprise
    team: core
    tenant_id: u19-alpha-perm
    tenant_name: u19-alpha-perm
    tier_id: "100"
    features:
        mission_critical: false
features:
    - p2p-cluster-local
    - gateway-api
cluster:
    name: oplabs-dev-ent-networks-us-ue1-0
l1:
    name: sepolia
    chain_id: 11155111
l2:
    deployment:
        op-deployer:
            version: 0.7.0-rc.1
        l1-contracts:
            locator: ""
        l2-contracts:
            locator: ""
        overrides:
            l2GenesisKarstTimeOffset: "0x0"
        fund_dev_accounts: true
        gas_limit: 60000000
        eip1559_elasticity: 6
        eip1559_denominator: 50
        eip1559_denominator_canyon: 250
    components:
        flashblocks-websocket-proxy:
            version: flashblocks-websocket-proxy/v0.7.4
        kona-node:
            version: kona-node/v1.5.2
        op-batcher:
            version: op-batcher/v1.16.9
        op-conductor:
            version: op-conductor/v0.9.4
        op-conductor-mon:
            version: op-conductor-mon/v0.0.5
        op-conductor-ops:
            version: op-conductor-ops/v0.0.2
        op-geth:
            version: op-geth/v1.101702.1
        op-interop-filter:
            version: op-interop-filter/v0.2.0-rc.1
        op-node:
            version: op-node/v1.18.2
        op-program:
            version: op-program/v1.9.0-rc.1
        op-rbuilder:
            version: op-rbuilder/v0.3.2-rc5
        op-reth:
            version: op-reth/v2.2.3
        op-supernode:
            version: op-supernode/v0.3.1-rc.1
        peer-mgmt-service:
            version: peer-mgmt-service/v0.0.4
        proxyd:
            version: proxyd/v4.27.1
        rollup-boost:
            version: rollup-boost/v0.7.11
    chains:
        - name: u19-alpha-perm-0
          chain_id: "420100009"
          deployment:
            overrides: {}
            gas_limit: 60000000
            eip1559_elasticity: 6
            eip1559_denominator: 50
            eip1559_denominator_canyon: 250
