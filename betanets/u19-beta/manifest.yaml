name: u19-beta
type: betanet
scope: https://github.com/ethereum-optimism/devnets/issues/316
status: online
description: |
    * U19 Betanet
      * Osaka on L2
      * L2CM
      * CANNON_KONA fault proofs
metadata:
    domain: op-enterprise
    team: core
    tenant_id: u19-beta
    tenant_name: u19-beta
    tier_id: "100"
    features:
        mission_critical: false
features:
    - p2p-cluster-local
    - gateway-api
cluster:
    name: oplabs-dev-ent-networks-us-ue1-0
l1:
    name: sepolia
    chain_id: 11155111
l2:
    deployment:
        op-deployer:
            version: 0.6.0-rc.3
        l1-contracts:
            locator: ""
        l2-contracts:
            locator: ""
        overrides:
            l2GenesisJovianTimeOffset: "0x0"
        gas_limit: 60000000
        eip1559_elasticity: 6
        eip1559_denominator: 50
        eip1559_denominator_canyon: 250
    components:
        balance-mon:
            version: balance-mon/v1.2.1
        flashblocks-websocket-proxy:
            version: flashblocks-websocket-proxy/v0.7.4
        kona-node:
            version: kona-node/v1.4.0
        op-batcher:
            version: op-batcher/v1.16.7
        op-challenger:
            version: op-challenger/v1.9.3-rc.1
        op-conductor:
            version: op-conductor/v0.9.3
        op-conductor-mon:
            version: op-conductor-mon/v0.0.5
        op-conductor-ops:
            version: op-conductor-ops/v0.0.2
        op-dispute-mon:
            version: op-dispute-mon/v1.5.2-rc.1
        op-geth:
            version: op-geth/v1.101702.2-rc.3
        op-node:
            version: op-node/v1.17.0
        op-program:
            version: op-program/v1.9.0-rc.1
        op-proposer:
            version: op-proposer/v1.16.3-rc.1
        op-rbuilder:
            version: op-rbuilder/v0.3.2-rc5
        op-reth:
            version: op-reth/v2.2.1
        peer-mgmt-service:
            version: peer-mgmt-service/v0.0.4
        proxyd:
            version: proxyd/v4.27.1
        rollup-boost:
            version: rollup-boost/v0.7.11
    chains:
        - name: u19-beta-0
          chain_id: "420120035"
          deployment:
            overrides: {}
            gas_limit: 60000000
            eip1559_elasticity: 6
            eip1559_denominator: 50
            eip1559_denominator_canyon: 250
        - name: u19-beta-1
          chain_id: "420120036"
          features:
            - fp-permissionless
          deployment:
            overrides: {}
            gas_limit: 60000000
            eip1559_elasticity: 6
            eip1559_denominator: 50
            eip1559_denominator_canyon: 250
workflow:
    disable_k8s_merge: true
